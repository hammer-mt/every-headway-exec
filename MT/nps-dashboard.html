<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Every — NPS Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #9ca3af;
    --promoter: #22c55e;
    --passive: #f59e0b;
    --detractor: #ef4444;
    --accent: #818cf8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
    min-height: 100vh;
  }
  h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: .25rem; }
  .subtitle { color: var(--muted); font-size: .95rem; margin-bottom: 2rem; }
  .grid { display: grid; gap: 1.25rem; margin-bottom: 1.25rem; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }
  .card h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: .75rem; font-weight: 600; }
  .big-number { font-size: 2.75rem; font-weight: 800; line-height: 1; }
  .big-number.promoter { color: var(--promoter); }
  .big-number.passive { color: var(--passive); }
  .big-number.detractor { color: var(--detractor); }
  .big-number.accent { color: var(--accent); }
  .label { font-size: .85rem; color: var(--muted); margin-top: .25rem; }
  .bar-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .5rem; font-size: .85rem; }
  .bar-label { width: 20px; text-align: right; color: var(--muted); flex-shrink: 0; }
  .bar-track { flex: 1; background: #252836; border-radius: 4px; height: 24px; position: relative; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; display: flex; align-items: center; padding-left: 8px; font-size: .75rem; font-weight: 600; color: #fff; }
  .bar-count { width: 28px; text-align: right; color: var(--muted); flex-shrink: 0; }
  .nps-gauge { text-align: center; padding: 2rem 1.5rem; }
  .nps-gauge .big-number { font-size: 4.5rem; }
  .nps-scale { display: flex; gap: 2px; margin-top: .5rem; }
  .nps-scale span { flex: 1; height: 6px; border-radius: 3px; }
  .chart-wrap { position: relative; height: 220px; }
  .verbatim-list { max-height: 400px; overflow-y: auto; }
  .verbatim-item { padding: .75rem 0; border-bottom: 1px solid var(--border); display: flex; gap: .75rem; align-items: flex-start; }
  .verbatim-item:last-child { border-bottom: none; }
  .verbatim-score {
    width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: .85rem; flex-shrink: 0;
  }
  .verbatim-score.p { background: rgba(34,197,94,.15); color: var(--promoter); }
  .verbatim-score.ps { background: rgba(245,158,11,.15); color: var(--passive); }
  .verbatim-score.d { background: rgba(239,68,68,.15); color: var(--detractor); }
  .verbatim-text { font-size: .85rem; color: var(--text); line-height: 1.5; }
  .filter-bar { display: flex; gap: .5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn {
    padding: .4rem .9rem; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; font-size: .8rem; font-weight: 500;
    transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .search-input {
    flex: 1; min-width: 180px; padding: .4rem .75rem; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: .8rem; outline: none;
  }
  .search-input:focus { border-color: var(--accent); }
  @media (max-width: 900px) {
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    body { padding: 1rem; }
  }
</style>
</head>
<body>

<h1>Every — NPS Dashboard</h1>
<p class="subtitle">Survey responses: subscriber sentiment analysis</p>

<div class="grid grid-4" id="kpi-cards"></div>

<div class="grid grid-3">

    <div id="score-bars"></div>
  </div>
  <div class="card">
    <h3>Segment Breakdown</h3>
    <div class="chart-wrap"><canvas id="donutChart"></canvas></div>
  </div>
</div>

<div class="card" style="margin-top:1.25rem">
  <h3>Verbatim Responses</h3>
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="promoter">Promoters</button>
    <button class="filter-btn" data-filter="passive">Passives</button>
    <button class="filter-btn" data-filter="detractor">Detractors</button>
    <input type="text" class="search-input" placeholder="Search responses…" id="searchInput">
  </div>
  <div class="verbatim-list" id="verbatimList"></div>
</div>

// Parse CSV
const rows = [];
const lines = raw.split('\n').slice(1);
for (const line of lines) {
  const match = line.match(/^(\d+),(.+)$/);
  if (match) {
    rows.push({ score: parseInt(match[1]), text: match[2].replace(/^"|"$/g, '').replace(/""/g, '"') });
  }
}

const total = rows.length;
const scores = rows.map(r => r.score);
const avg = (scores.reduce((a, b) => a + b, 0) / total).toFixed(1);
const promoters = rows.filter(r => r.score >= 9);
const passives = rows.filter(r => r.score >= 7 && r.score <= 8);
const detractors = rows.filter(r => r.score <= 6);
const nps = Math.round((promoters.length / total - detractors.length / total) * 100);

// Distribution
const dist = Array(11).fill(0);
scores.forEach(s => dist[s]++);
const maxCount = Math.max(...dist);

// KPI Cards
document.getElementById('kpi-cards').innerHTML = `
  <div class="card">
    <h3>NPS Score</h3>
    <div class="big-number accent">${nps >= 0 ? '+' : ''}${nps}</div>
    <div class="label">${total} responses</div>
  </div>
  <div class="card">
    <h3>Promoters (9–10)</h3>
    <div class="big-number promoter">${(promoters.length / total * 100).toFixed(1)}%</div>
    <div class="label">${promoters.length} respondents</div>
  </div>
  <div class="card">
    <h3>Passives (7–8)</h3>
    <div class="big-number passive">${(passives.length / total * 100).toFixed(1)}%</div>
    <div class="label">${passives.length} respondents</div>
  </div>
  <div class="card">
    <h3>Detractors (0–6)</h3>
    <div class="big-number detractor">${(detractors.length / total * 100).toFixed(1)}%</div>
    <div class="label">${detractors.length} respondents</div>
  </div>
`;

// NPS Gauge
const gaugeEl = document.getElementById('nps-gauge');
gaugeEl.innerHTML = `
  <h3>Net Promoter Score</h3>
  <div class="big-number accent" style="margin: .5rem 0">${nps >= 0 ? '+' : ''}${nps}</div>
  <div class="label">Average score: ${avg} / 10</div>
  <div class="nps-scale" style="margin-top:1rem">
    ${Array.from({length: 11}, (_, i) => {
      const c = i <= 6 ? 'var(--detractor)' : i <= 8 ? 'var(--passive)' : 'var(--promoter)';
      return `<span style="background:${c};opacity:${dist[i] ? 1 : 0.2}"></span>`;
    }).join('')}
  </div>
  <div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-top:.35rem">
    <span>0</span><span>6</span><span>8</span><span>10</span>
  </div>
`;

// Score bars
const barsEl = document.getElementById('score-bars');
for (let i = 10; i >= 0; i--) {
  const pct = (dist[i] / maxCount * 100);
  const color = i <= 6 ? 'var(--detractor)' : i <= 8 ? 'var(--passive)' : 'var(--promoter)';
  barsEl.innerHTML += `
    <div class="bar-row">
      <span class="bar-label">${i}</span>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${color}">${dist[i] > 0 ? dist[i] : ''}</div>
      </div>
      <span class="bar-count">${dist[i]}</span>
    </div>`;
}

// Donut
new Chart(document.getElementById('donutChart'), {
  type: 'doughnut',
  data: {
    labels: ['Promoters', 'Passives', 'Detractors'],
    datasets: [{
      data: [promoters.length, passives.length, detractors.length],
      backgroundColor: ['#22c55e', '#f59e0b', '#ef4444'],
      borderColor: '#1a1d27',
      borderWidth: 3,
    }]
  },
  options: {
    cutout: '65%',
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { position: 'bottom', labels: { color: '#9ca3af', padding: 16, font: { size: 12 } } }
    }
  }
});

// Verbatims
const listEl = document.getElementById('verbatimList');
let activeFilter = 'all';
let searchTerm = '';

function classify(score) {
  if (score >= 9) return 'promoter';
  if (score >= 7) return 'passive';
  return 'detractor';
}

function render() {
  const filtered = rows.filter(r => {
    const cat = classify(r.score);
    if (activeFilter !== 'all' && cat !== activeFilter) return false;
    if (searchTerm && !r.text.toLowerCase().includes(searchTerm.toLowerCase())) return false;
    return true;
  }).sort((a, b) => b.score - a.score);

  listEl.innerHTML = filtered.map(r => {
    const cls = r.score >= 9 ? 'p' : r.score >= 7 ? 'ps' : 'd';
    return `<div class="verbatim-item">
      <div class="verbatim-score ${cls}">${r.score}</div>
      <div class="verbatim-text">${r.text}</div>
    </div>`;
  }).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

render();
</script>
</body>
